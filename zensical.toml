[project]
site_name = "CVEalert.io Documentation"
site_url = "https://docs.cvealert.io"
site_author = "Kamil Vavra"
site_description = """
CVEalert.io helps you stay ahead of security vulnerabilities by monitoring, alerting,
and managing CVEs in real time. Built for developers, teams, and security professionals.
"""
repo_name = "cvealert/docs"
repo_url = "https://github.com/cvealert/docs"
edit_uri = "blob/main/docs/"
copyright = """
Copyright &copy; 2025 CVEalert.io
"""
nav = [
  { "Getting Started" = [
    { "Overview" = "index.md" },
    { "Preview" = "preview.md" },
    { "First Steps" = "first-steps.md" },
    { "Registration" = "registration.md" },
    { "Login" = "login.md" },
    { "FAQ" = "faq.md" },
  ] },
  { "Application" = [
    { "Dashboard" = "app/dashboard.md" },
    { "Alerts" = "app/alerts.md" },
    { "CVE detail" = "app/cve.md" },
  ] },
  { "Software" = [
    { "Monitoring" = "software/monitoring.md" },
    { "Catalog" = "software/catalog.md" },
    { "Search" = "software/search.md" },
    { "CVEs" = "software/cves.md" },
  ] },
  { "Settings" = [
    { "Projects" = "settings/projects.md" },
    { "Roles" = "settings/projects/roles.md" },
    { "Webhooks" = "settings/webhooks.md" },
    { "Account" = "settings/user.md" },
    { "2FA" = "settings/2fa.md" },
    { "Logs" = "settings/logs.md" },
  ] },
]

[project.theme]
language = "en"
favicon = "assets/logo.webp"
logo = "assets/logo.webp"
features = [
  "content.action.edit",
  "content.action.view",
  "navigation.tabs",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "orange"

[project.markdown_extensions.attr_list]
[project.markdown_extensions.admonition]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]
[project.markdown_extensions.pymdownx.blocks.caption]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.extra]
social = [
  { icon = "fontawesome/brands/github", link = "https://github.com/cvealert", name = "GitHub" },
  { icon = "fontawesome/brands/linkedin", link = "https://www.linkedin.com/company/cvealert/", name = "LinkedIn" },
  { icon = "fontawesome/solid/battery-three-quarters", link = "https://stats.uptimerobot.com/CKfINonKI7", name = "Status Page" },
  { icon = "fontawesome/solid/envelope", link = "mailto:info@cvealert.io", name = "Email address" },
]
alternate = [
  { name = "English", link = "/", lang = "en" },
]
