# https://github.com/squidfunk/mkdocs-material

name: Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2 # zizmor: ignore[unpinned-uses]
        with:
          persist-credentials: false

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Set up Python
        uses: actions/setup-python@v6 # zizmor: ignore[unpinned-uses]
        with:
          python-version-file: '.python-version'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run zensical
        run: |
          zensical --version

      - name: Build site
        run: |
          zensical build --clean

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4 # zizmor: ignore[unpinned-uses]
        with:
          path: site

      - name: Deploy pages
        uses: actions/deploy-pages@v4 # zizmor: ignore[unpinned-uses]
        id: deployment
